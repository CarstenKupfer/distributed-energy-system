spring.application.name=disys-current-percentage-service

server.port=8084

# PostgreSQL connection
spring.datasource.url=jdbc:postgresql://localhost:5432/disysuser
spring.datasource.username=disysuser
spring.datasource.password=disyspw
spring.datasource.driver-class-name=org.postgresql.Driver

# Automatically create/update tables
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# RabbitMQ connection
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest